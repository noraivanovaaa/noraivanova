<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Нора Иванова — Манифестирай изобилието</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream: '#FAF6F0',
          'cream-deep': '#F4EEE4',
          ink: '#2D2A28',
          'ink-soft': '#5A524C',
          sand: '#E8DFD2',
          lavender: '#C9B8D9',
          'lavender-soft': '#E2D6EB',
          peach: '#F0D4C8',
          'peach-soft': '#F8E6DD',
        },
        fontFamily: {
          serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
          sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
        },
        borderRadius: {
          '4xl': '2rem',
        }
      }
    }
  }
</script>

<style>
  html, body { background: #FAF6F0; color: #2D2A28; }
  body { font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; letter-spacing: -0.01em; }
  .reveal { opacity: 0; transform: translateY(18px); transition: opacity 1.1s cubic-bezier(.2,.7,.2,1), transform 1.1s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  .hairline { border-color: #E8DFD2; }
  .grain::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.5; mix-blend-mode: multiply;
    background-image: radial-gradient(rgba(45,42,40,0.04) 1px, transparent 1px);
    background-size: 3px 3px;
  }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] .faq-icon { transform: rotate(45deg); }
  .faq-icon { transition: transform .35s ease; }
  /* soft float for the lavender disc */
  @keyframes drift { 0%,100%{ transform: translate(0,0);} 50%{ transform: translate(0, -10px);} }
  .drift { animation: drift 9s ease-in-out infinite; }
  @keyframes drift2 { 0%,100%{ transform: translate(0,0);} 50%{ transform: translate(-8px, 6px);} }
  .drift2 { animation: drift2 11s ease-in-out infinite; }
  /* hero portrait soft mask blends into cream bg */
  .portrait-mask {
    -webkit-mask-image: radial-gradient(ellipse 75% 80% at 50% 45%, #000 60%, transparent 100%);
            mask-image: radial-gradient(ellipse 75% 80% at 50% 45%, #000 60%, transparent 100%);
  }
</style>
</head>
<body class="antialiased">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="app.jsx"></script>
</body>
</html>
